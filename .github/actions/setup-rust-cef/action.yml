name: Setup Rust and CEF
description: Install toolchain components, cache Cargo/CEF assets, and download CEF for one target.

inputs:
  target:
    description: Rust target triple to install and download CEF for.
    required: true
  cef-cache-key:
    description: Platform-specific CEF cache suffix.
    required: true
  cargo-cache-prefix:
    description: Prefix used for the Cargo cache key.
    required: true
  msvc-arch:
    description: MSVC developer prompt architecture for Windows runners.
    required: false
    default: ""
  install-clippy:
    description: Install the clippy component before building.
    required: false
    default: "false"
  install-linux-deps:
    description: Install Linux build dependencies on Linux runners.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install system dependencies (Linux)
      if: ${{ inputs.install-linux-deps == 'true' && runner.os == 'Linux' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libgtk-3-dev \
          libnss3-dev \
          libatk1.0-dev \
          libatk-bridge2.0-dev \
          libcups2-dev \
          libdrm-dev \
          libxkbcommon-dev \
          libxcomposite-dev \
          libxdamage-dev \
          libxrandr-dev \
          libgbm-dev \
          libpango1.0-dev \
          libasound2-dev \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          binutils-aarch64-linux-gnu

    - name: Setup mise toolchain
      uses: jdx/mise-action@v2
      with:
        cache: true

    - name: Install Clippy component
      if: ${{ inputs.install-clippy == 'true' }}
      shell: bash
      run: mise exec -- rustup component add clippy

    - name: Install Rust target
      shell: bash
      run: rustup target add "${{ inputs.target }}"

    - name: Select MSVC toolchain
      if: ${{ runner.os == 'Windows' }}
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ inputs.msvc-arch }}

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Cache Cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ inputs.cargo-cache-prefix }}-${{ inputs.target }}-cargo-${{ hashFiles('**/Cargo.lock', 'mise.toml') }}
        restore-keys: |
          ${{ inputs.cargo-cache-prefix }}-${{ inputs.target }}-cargo-

    - name: Cache CEF binaries
      uses: actions/cache@v4
      id: cef-cache
      with:
        path: ${{ env.CEF_PATH }}
        key: cef-${{ hashFiles('mise.toml') }}-${{ inputs.cef-cache-key }}

    - name: Download CEF binaries (Linux/macOS)
      if: ${{ steps.cef-cache.outputs.cache-hit != 'true' && runner.os != 'Windows' }}
      shell: bash
      run: mise exec -- sh -c 'export-cef-dir --version "$CEF_VERSION" --force --target "${{ inputs.target }}" "$CEF_PATH"'

    - name: Download CEF binaries (Windows)
      if: ${{ steps.cef-cache.outputs.cache-hit != 'true' && runner.os == 'Windows' }}
      shell: pwsh
      run: mise exec -- pwsh -NoProfile -Command 'export-cef-dir --version $env:CEF_VERSION --force --target "${{ inputs.target }}" $env:CEF_PATH'

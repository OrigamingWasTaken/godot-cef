# Install toolchain dependencies with:
#   mise install

[tools]
# Nightly is required by retour-rs for feature(unboxed_closures, tuple_trait).
rust = { version = "nightly", components = "rustfmt,clippy", targets = "aarch64-linux-android,x86_64-linux-android" }
java = "temurin-21"
gradle = "8.14.3"
kotlin = "2.2.21"
android-sdk = "20.0"
node = "24"
pnpm = "10.29.3"
"cargo:export-cef-dir" = "148.1.0+147.0.14"
"cargo:cargo-ndk" = "latest"

[env]
# Keep this in sync with the resolved cef / cef-dll-sys version in Cargo.lock,
# using the CEF runtime build version after the '+'.
CEF_VERSION = "147.0.14"
ANDROID_RUST_TARGETS = "aarch64-linux-android x86_64-linux-android"

[tasks."android:sdk"]
description = "Install Android SDK packages required by the Kotlin bridge"
run = [
  "yes | sdkmanager --licenses >/dev/null",
  "sdkmanager 'platform-tools' 'platforms;android-35' 'build-tools;35.0.0' 'ndk;28.2.13676358'",
]

[tasks."android:targets"]
description = "Install Rust targets used by Android builds"
run = "rustup target add $ANDROID_RUST_TARGETS"

[tasks."android:kotlin"]
description = "Build the experimental Android WebView Kotlin bridge"
depends = ["android:sdk"]
run = "gradle -p android :godot-cef-webview:assembleDebug"

[tasks."android:rust"]
description = "Check the gdcef crate for Android Rust targets"
depends = ["android:targets"]
run = [
  "cargo check -p gdcef --target aarch64-linux-android",
  "cargo check -p gdcef --target x86_64-linux-android",
]

[tasks."android:build-rust"]
description = "Build Android gdcef shared libraries"
depends = ["android:sdk", "android:targets"]
run = [
  "cargo ndk --target arm64-v8a --target x86_64 --platform 29 -- build -p gdcef --release",
]

[tasks."android:check"]
description = "Check Android Rust targets and Kotlin bridge"
depends = ["android:rust", "android:kotlin"]
